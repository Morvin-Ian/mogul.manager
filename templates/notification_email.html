<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body style="margin: 0; padding: 0; font-family: 'Outfit', -apple-system, system-ui, sans-serif; background: #F4F4F6; -webkit-font-smoothing: antialiased;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background: #F4F4F6; padding: 40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellspacing="0" cellpadding="0" style="background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 6px 28px rgba(10,11,13,0.10), 0 1px 6px rgba(10,11,13,0.06);">
          <!-- Header -->
          <tr>
            <td style="padding: 28px 32px; background: #0052FF;">
              <table role="presentation" cellspacing="0" cellpadding="0">
                <tr>
                  <td style="font-size: 26px; font-weight: 700; color: #ffffff; letter-spacing: -1px; line-height: 1;">mogul<span style="color: #ffffff; opacity: 0.8;">.</span></td>
                  <td style="font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.65); letter-spacing: 0.3px; padding-left: 4px; vertical-align: baseline;">manager</td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding: 36px 32px;">
              <h1 style="margin: 0 0 16px 0; font-size: 20px; font-weight: 700; color: #0A0B0D; letter-spacing: -0.3px;">{{ title }}</h1>
              <p style="margin: 0 0 20px 0; font-size: 15px; line-height: 1.6; color: #5B616E;">{{ message }}</p>
              {% if link %}
              <table role="presentation" cellspacing="0" cellpadding="0">
                <tr>
                  <td style="background: #0052FF; border-radius: 9999px;">
                    <a href="{{ link }}" style="display: inline-block; padding: 12px 28px; color: #ffffff; text-decoration: none; font-size: 15px; font-weight: 600; letter-spacing: 0.2px;">View Details</a>
                  </td>
                </tr>
              </table>
              {% endif %}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding: 20px 32px; border-top: 1px solid #D8D9DE;">
              <p style="margin: 0; font-size: 13px; color: #8A919E; text-align: center;">Sent from <strong style="color: #5B616E;">mogul.manager</strong></p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
